name: 🚀 Minerador Automático Edge Pro

on:
  schedule:
    - cron: '0 11,21 * * *' 
  workflow_dispatch: 

jobs:
  executar_minerador:
    runs-on: ubuntu-latest
    
    steps:
      - name: 1. Baixando os arquivos
        uses: actions/checkout@v3

      - name: 2. Configurando Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: 3. Instalando bibliotecas
        run: |
          pip install requests psycopg2-binary pytz

      - name: 4. Executando o Robô
        # AQUI ESTAVA O ERRO: Faltava passar as chaves do Telegram!
        env:
          DB_URL: ${{ secrets.DB_URL }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}   # <--- LINHA NOVA
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }} # <--- LINHA NOVA
        run: python worker_saas.py
        